name: Build 360T7 ImmortalWrt mtwifi GecoosAC

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: 360t7-gecoosac.config
  TZ: Asia/Shanghai

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout build configuration
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev \
            libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
            p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Clone source
        run: |
          git clone --depth=1 --single-branch -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Add Gecoos AC source
        run: |
          cd openwrt
          ../diy-part1.sh

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load configuration and verify target
        run: |
          cp "$CONFIG_FILE" openwrt/.config
          cp -a files openwrt/files
          cd openwrt
          ../diy-part2.sh
          make defconfig
          grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_qihoo_360t7=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-mt_wifi=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-mtwifi-cfg=y' .config
          grep -q '^CONFIG_PACKAGE_gecoosac=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-gecoosac=y' .config
          echo 'Selected key options:'
          grep -E 'DEVICE_qihoo_360t7|kmod-mt_wifi|luci-app-mtwifi-cfg|gecoosac' .config

      - name: Download sources
        run: |
          cd openwrt
          make download -j8
          find dl -type f -size -1024c -print -delete

      - name: Compile firmware
        run: |
          cd openwrt
          make -j"$(nproc)" || make -j1 V=s

      - name: Validate and collect output
        id: collect
        run: |
          set -e
          OUT="openwrt/bin/targets/mediatek/filogic"
          FW="$(find "$OUT" -maxdepth 1 -type f \( -name '*qihoo_360t7*sysupgrade*' -o -name '*qihoo_360t7*.itb' \) | head -n1)"
          test -n "$FW"
          mkdir -p release
          cp "$FW" release/
          cp "$OUT"/*qihoo_360t7*.manifest release/ 2>/dev/null || true
          cp "$OUT"/config.buildinfo release/ 2>/dev/null || cp openwrt/.config release/config.buildinfo
          cp "$OUT"/feeds.buildinfo release/ 2>/dev/null || true
          cp "$OUT"/version.buildinfo release/ 2>/dev/null || true
          cp "$OUT"/profiles.json release/ 2>/dev/null || true
          sha256sum release/* > release/sha256sums
          test -f release/*manifest
          grep -q '^gecoosac ' release/*manifest
          grep -q '^luci-app-gecoosac ' release/*manifest
          grep -q '^luci-app-mtwifi-cfg ' release/*manifest
          grep -q '^kmod-mt_wifi ' release/*manifest
          echo "tag=360t7-$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 360T7-ImmortalWrt-mtwifi-GecoosAC
          path: release/
          retention-days: 30

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.collect.outputs.tag }}
          name: 360T7 ImmortalWrt mtwifi + Gecoos AC
          body: |
            - Target: Qihoo 360T7 / MT7981
            - Base: ImmortalWrt 24.10, Linux 6.6 branch
            - Wireless: MediaTek proprietary mtwifi
            - Storage: NMBM fixed-parts layout
            - AC controller: Gecoos AC 2.2.20251015
            - Default LAN: 192.168.6.1
            - Username: root; password: empty on first boot
          files: release/*
